name: auction_app
description: English Auction Mobile Application for OracleSQL Backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  dio: ^5.4.0
  
  # Utilities
  intl: ^0.19.0
  
  # WebSocket (STOMP)
  stomp_dart_client: ^2.0.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Typography
  google_fonts: ^6.1.0

  # UI Enhancement
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1

  # VNPay WebView
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
